<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, uploadBytesResumable, getDownloadURL, getBlob, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyA0XXyuZuS_4U6o2QlgypRKRmWDQKBuZfw",
  authDomain: "cello-practice-a3615.firebaseapp.com",
  projectId: "cello-practice-a3615",
  storageBucket: "cello-practice-a3615.firebasestorage.app",
  messagingSenderId: "764227722210",
  appId: "1:764227722210:web:ecd0250331e50bdd2337bb"
};

const app = initializeApp(firebaseConfig);
const db_fs = getFirestore(app);
const storage = getStorage(app);

async function fsGet(path){
  const parts = path.split('/');
  const snap = await getDoc(doc(db_fs, ...parts));
  return snap.exists() ? snap.data() : null;
}
async function fsSet(path, data){
  const parts = path.split('/');
  await setDoc(doc(db_fs, ...parts), data, {merge:true});
}
async function uploadToStorage(dataUrl, fileName, storagePath){
  const arr=dataUrl.split(','), mime=arr[0].match(/:(.*?);/)[1];
  const bstr=atob(arr[1]); let n=bstr.length; const u8=new Uint8Array(n);
  while(n--) u8[n]=bstr.charCodeAt(n);
  const blob=new Blob([u8],{type:mime});
  const path=storagePath+'/'+Date.now()+'_'+fileName;
  const storageRef=ref(storage, path);
  await uploadBytes(storageRef, blob);
  const url=await getDownloadURL(storageRef);
  return {url, path};  // URL과 경로 둘 다 반환
}
// Upload a File/Blob directly to Storage WITHOUT base64 conversion (memory-efficient)
async function detectMime(file){
  // Sniff the real container from the file's header bytes (ftyp brand for ISO media)
  try{
    const head=new Uint8Array(await file.slice(0,16).arrayBuffer());
    // bytes 4-8 == 'ftyp'
    if(head[4]===0x66&&head[5]===0x74&&head[6]===0x79&&head[7]===0x70){
      const brand=String.fromCharCode(head[8],head[9],head[10],head[11]);
      if(brand.startsWith('3g')) return 'audio/mp4';       // 3GPP container but AAC codec → label as mp4 for max browser support
      if(brand.startsWith('M4A')||brand.startsWith('mp4')||brand.startsWith('isom')) return 'audio/mp4';
      if(brand.startsWith('qt')) return 'video/quicktime';
    }
    // ID3 or MPEG frame → mp3
    if(head[0]===0x49&&head[1]===0x44&&head[2]===0x33) return 'audio/mpeg';
    if(head[0]===0xFF&&(head[1]&0xE0)===0xE0) return 'audio/mpeg';
    // RIFF/WAVE
    if(head[0]===0x52&&head[1]===0x49&&head[2]===0x46&&head[3]===0x46) return 'audio/wav';
    // OggS
    if(head[0]===0x4F&&head[1]===0x67&&head[2]===0x67&&head[3]===0x53) return 'audio/ogg';
  }catch(e){}
  return '';
}
async function uploadFileToStorage(file, storagePath, onProgress){
  const safeName=(file.name||'file').replace(/[^\w.\-가-힣]/g,'_');
  const path=storagePath+'/'+Date.now()+'_'+safeName;
  const storageRef=ref(storage, path);
  // Detect real format from header first (handles mislabeled .m4a that are actually 3gp)
  let ct=await detectMime(file);
  if(!ct) ct=file.type||'';
  if(!ct){
    const ext=safeName.split('.').pop().toLowerCase();
    const extMap={mp3:'audio/mpeg',m4a:'audio/mp4',wav:'audio/wav',ogg:'audio/ogg',
                  aac:'audio/aac',caf:'audio/x-caf',amr:'audio/amr','3gp':'audio/mp4',
                  jpg:'image/jpeg',jpeg:'image/jpeg',png:'image/png',gif:'image/gif',
                  webp:'image/webp',pdf:'application/pdf'};
    ct=extMap[ext]||'application/octet-stream';
  }
  // Use resumable upload (chunked) — reliable for large files on mobile networks
  return new Promise((resolve, reject)=>{
    const task=uploadBytesResumable(storageRef, file, {contentType: ct});
    task.on('state_changed',
      (snap)=>{
        if(onProgress && snap.totalBytes>0){
          onProgress(Math.round(snap.bytesTransferred/snap.totalBytes*100));
        }
      },
      (err)=>{ reject(err); },
      async()=>{
        try{
          const url=await getDownloadURL(task.snapshot.ref);
          resolve({url, path, contentType: ct});
        }catch(e){ reject(e); }
      }
    );
  });
}

// Expose to global scope
window._fb = { db_fs, storage, fsGet, fsSet, uploadToStorage, uploadFileToStorage, doc, setDoc, getDoc, onSnapshot, ref, getBlob, deleteObject };
// Dispatch event so main script knows Firebase is ready
document.dispatchEvent(new CustomEvent('fbReady', { detail: window._fb }));
console.log('✅ Firebase module initialized');
</script>

async function _saveToFirestore(){
  try{localStorage.setItem('celloData13',JSON.stringify(db));}catch(e){}

  if(!window._fb) return;
  const {db_fs, doc, setDoc} = window._fb;

  const showErr = (msg) => {
    const el=document.getElementById('fbStatus');
    if(el){el.style.display='block';el.style.background='#F8D7DA';el.style.color='#721C24';el.textContent='❌ 저장 오류: '+msg;}
    console.error('Firestore error:', msg);
  };

  // Recursively sanitize any value into a Firestore-safe plain type.
  // Rules enforced:
  //   • undefined / function / symbol / bigint  → null
  //   • NaN / ±Infinity                          → 0
  //   • Date instance                            → ISO string
  //   • Firestore Timestamp (has .toDate())      → ISO string
  //   • Firestore DocumentReference (.path)      → path string
  //   • Array whose element is itself an Array   → element replaced with null
  //     (Firestore forbids nested arrays entirely)
  //   • Plain object                             → recurse over own keys
  function deepClean(val) {
    if (val === null) return null;
    if (val === undefined) return null;
    const t = typeof val;
    if (t === 'boolean') return val;
    if (t === 'string')  return val;
    if (t === 'number')  return isFinite(val) ? val : 0;
    if (t === 'function' || t === 'symbol' || t === 'bigint') return null;
    // From here val is an object (including Array, Date, class instances)
    if (Array.isArray(val)) {
      return val.map(item => {
        if (Array.isArray(item)) return null; // Firestore: no nested arrays
        return deepClean(item);
      });
    }
    if (val instanceof Date) {
      return isNaN(val.getTime()) ? null : val.toISOString();
    }
    // Firestore Timestamp: duck-type check
    if (typeof val.toDate === 'function' && typeof val.seconds === 'number') {
      try { return val.toDate().toISOString(); } catch(_){ return null; }
    }
    // Firestore DocumentReference: duck-type check
    if (typeof val.path === 'string' && val.firestore !== undefined) {
      return val.path;
    }
    // Plain object — copy own enumerable keys, skip functions/undefined
    const out = {};
    for (const key of Object.keys(val)) {
      const v = val[key];
      if (v === undefined || typeof v === 'function') continue;
      out[key] = deepClean(v);
    }
    return out;
  }

  // Build a clean feedbacks map (keys = monday-date strings, values = HTML strings)
  function cleanFeedbacks(raw) {
    if (!raw || typeof raw !== 'object' || Array.isArray(raw)) return {};
    const out = {};
    for (const key of Object.keys(raw)) {
      const v = raw[key];
      // Guarantee every value is a plain string
      if (typeof v === 'string') out[key] = v;
      else if (v !== null && v !== undefined) out[key] = String(v);
      else out[key] = '';
    }
    return out;
  }

  try {
    for (const m of MEMBERS) {
      const mKey = m.replace(/\s/g, '_');
      const data = db[m] || {};

      const rawLogs = Array.isArray(data.logs) ? data.logs : [];
      const logs = rawLogs.map(log => ({
        uid:          String(log.uid  || newUid()),
        date:         (log.date && typeof log.date.toDate === 'function') ? log.date.toDate().toISOString().split('T')[0] : String(log.date || '').split('T')[0],
        totalMin:     isFinite(Number(log.totalMin))  ? Number(log.totalMin)  : 0,
        scaleMin:     isFinite(Number(log.scaleMin))  ? Number(log.scaleMin)  : 0,
        scaleContent: String(log.scaleContent  || ''),
        fingerMin:    isFinite(Number(log.fingerMin)) ? Number(log.fingerMin) : 0,
        fingerContent:String(log.fingerContent || ''),
        pieceMin:     isFinite(Number(log.pieceMin))  ? Number(log.pieceMin)  : 0,
        pieceContent: String(log.pieceContent  || ''),
        note:         String(log.note || ''),
        media: (Array.isArray(log.media) ? log.media : [])
          .filter(f => f && typeof f === 'object' && f.name && (f.data || f.fileUrl))
          .map(f => ({
            name: String(f.name || ''),
            type: String(f.type || ''),
            data: String(f.data || ''),
            fileUrl: String(f.fileUrl || ''),
            storagePath: String(f.storagePath || '')
          }))
      }));

      const payload = deepClean({
        feedbacks: cleanFeedbacks(data.feedbacks),
        theme: {
          themeIdx: isFinite(Number((data.theme||{}).themeIdx)) ? Number((data.theme||{}).themeIdx) : 0,
          costume:  String((data.theme||{}).costume || 'none')
        },
        logs
      });

      await setDoc(doc(db_fs, 'members', mKey), payload, {merge: true});
    }

    const rawMats = Array.isArray(db._guide.materials) ? db._guide.materials : [];
    const guidePayload = deepClean({
      notice: String(db._guide.notice || ''),
      materials: rawMats
        .filter(mat => mat && mat.name)
        .map(mat => ({
          name:        String(mat.name        || ''),
          desc:        String(mat.desc        || ''),
          link:        String(mat.link        || ''),
          fileUrl:     String(mat.fileUrl     || ''),
          storagePath: String(mat.storagePath || ''),
          fileName:    String(mat.fileName    || ''),
          fileData:    String(mat.fileData    || '')
        }))
    });
    await setDoc(doc(db_fs, 'guide', 'data'), guidePayload, {merge: true});

    console.log('✅ Firestore save OK');

  } catch(e) {
    console.error('Firestore save error:', e.code, e.message, e);
    showErr(e.message);
  }
}
// Recursively convert Firestore native types (Timestamp, etc.) to plain JS values.
// Called on snap.data() / fsGet() results before storing into db.
function normalizeFromFirestore(val) {
  if (val === null || val === undefined) return val;
  const t = typeof val;
  if (t === 'boolean' || t === 'number' || t === 'string') return val;
  // Firestore Timestamp
  if (t === 'object' && typeof val.toDate === 'function' && typeof val.seconds === 'number') {
    try { return val.toDate().toISOString().split('T')[0]; } catch(_) { return ''; }
  }
  if (Array.isArray(val)) return val.map(normalizeFromFirestore);
  // Plain object
  const out = {};
  for (const k of Object.keys(val)) out[k] = normalizeFromFirestore(val[k]);
  return out;
}

// RTE
function rteCmd(cmd,val,id){
  const el=document.getElementById(id);if(!el)return;
  el.focus();
  if(cmd==='fontSize') document.execCommand('fontSize',false,val);
  else document.execCommand(cmd,false,null);
}
function rteForeColor(color,id){const el=document.getElementById(id);if(!el)return;el.focus();document.execCommand('foreColor',false,color);}
function rteClear(id){const el=document.getElementById(id);if(!el)return;el.focus();document.execCommand('removeFormat',false,null);}

function applyFontSize(id, px){
  const el=document.getElementById(id);if(!el)return;
  const size=Math.min(48,Math.max(8,parseInt(px)||14));
  const inp=document.getElementById('fontSizeInput_'+id);
  if(inp)inp.value=size;
  el.focus();
  const sel=window.getSelection();
  if(!sel||sel.rangeCount===0||sel.isCollapsed){
    // No selection — apply to all content via CSS on the editor
    el.style.fontSize=size+'px';
    return;
  }
  // Selection exists — wrap in span
  const range=sel.getRangeAt(0);
  try{
    document.execCommand('fontSize',false,'7');
    const sized=el.querySelectorAll('font[size="7"]');
    sized.forEach(f=>{
      const span=document.createElement('span');
      span.style.fontSize=size+'px';
      span.innerHTML=f.innerHTML;
      f.parentNode.replaceChild(span,f);
    });
  }catch(e){
    document.execCommand('fontSize',false,'4');
  }
}

function adjustFontSize(id, delta){
  const inp=document.getElementById('fontSizeInput_'+id);
  const current=parseInt(inp?inp.value:14)||14;
  applyFontSize(id, current+delta);
}

// Update font size display when cursor moves
function trackFontSize(id){
  const el=document.getElementById(id);if(!el)return;
  el.addEventListener('keyup',()=>readCurrentSize(id));
  el.addEventListener('mouseup',()=>readCurrentSize(id));
}
function readCurrentSize(id){
  const inp=document.getElementById('fontSizeInput_'+id);if(!inp)return;
  try{
    const sz=document.queryCommandValue('fontSize');
    const map={'1':10,'2':12,'3':14,'4':18,'5':24,'6':32,'7':48};
    if(sz&&map[sz])inp.value=map[sz];
    // Also check computed style of selection
    const sel=window.getSelection();
    if(sel&&sel.rangeCount>0&&!sel.isCollapsed){
      const node=sel.getRangeAt(0).startContainer.parentElement;
      const cs=window.getComputedStyle(node);
      const px=parseInt(cs.fontSize);
      if(px)inp.value=px;
    }
  }catch(e){}
}

function storagePathFromUrl(url){
  // Firebase Storage URL에서 경로 추출
  // 형식: .../o/materials%2Ftimestamp_file.jpg?alt=media&token=...
  try{
    const m=decodeURIComponent(new URL(url).pathname).match(/\/o\/(.+)$/);
    return m?m[1]:'';
  }catch(e){return '';}
}
async function downloadFromUrl(url, fileName, storagePath){
  try{
    const path=storagePath||storagePathFromUrl(url);
    let blob;
    if(path && window._fb && window._fb.getBlob){
      blob=await window._fb.getBlob(window._fb.ref(window._fb.storage, path));
    } else {
      const res=await fetch(url);
      if(!res.ok) throw new Error('fetch '+res.status);
      blob=await res.blob();
    }
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=fileName||'download';
    document.body.appendChild(a);a.click();
    setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},1500);
  }catch(e){
    console.error('download error',e);
    // CORS 미설정 시 새 탭으로 열기 + 안내
    const ok=confirm('직접 다운로드를 사용하려면 Firebase Storage CORS 설정이 필요합니다.\n\n지금은 새 탭에서 열어드립니다.\n브라우저에서 "다른 이름으로 저장"(Ctrl+S)으로 저장하세요.\n\n확인을 누르면 새 탭으로 열립니다.');
    if(ok) window.open(url,'_blank');
  }
}
function downloadMaterial(i){
  const mat=db._guide.materials[i];
  if(!mat) return;
  downloadFromUrl(mat.fileUrl, mat.fileName||mat.name, mat.storagePath||'');
}
function downloadFile(dataUrl, fileName){
  // Storage URL (https): open directly in new tab to download/view
  if(dataUrl && !dataUrl.startsWith('data:')){
    window.open(dataUrl,'_blank');
    return;
  }
  try{
    const arr=dataUrl.split(','), mime=arr[0].match(/:(.*?);/)[1];
    const bstr=atob(arr[1]);let n=bstr.length;const u8=new Uint8Array(n);
    while(n--) u8[n]=bstr.charCodeAt(n);
    const blob=new Blob([u8],{type:mime});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=fileName||'download';
    document.body.appendChild(a);a.click();
    setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},1000);
  }catch(e){alert('다운로드 중 오류가 발생했습니다.');}
}

function openFilePreview(dataUrl, fileName, explicitType){
  // mime detection: explicit type > data URL prefix > filename extension
  let mime=explicitType||'';
  if(!mime && dataUrl.startsWith('data:')){
    mime=dataUrl.split(';')[0].replace('data:','');
  }
  if(!mime && fileName){
    const ext=fileName.split('.').pop().toLowerCase();
    const extMap={jpg:'image/jpeg',jpeg:'image/jpeg',png:'image/png',gif:'image/gif',webp:'image/webp',
                  pdf:'application/pdf',mp3:'audio/mpeg',m4a:'audio/mp4',wav:'audio/wav',
                  ogg:'audio/ogg',aac:'audio/aac',caf:'audio/x-caf'};
    mime=extMap[ext]||'';
  }
  const body=document.getElementById('previewBody');
  document.getElementById('previewTitle').textContent=fileName||'미리보기';
  body.innerHTML='';
  if(mime.startsWith('image/')){
    body.innerHTML=`<img src="${dataUrl}" style="max-width:100%;border-radius:8px;margin-bottom:10px;">`;
  } else if(mime==='application/pdf'){
    if(dataUrl.startsWith('data:')){
      try{
        const arr=dataUrl.split(','),bstr=atob(arr[1]);let n=bstr.length;const u8=new Uint8Array(n);
        while(n--) u8[n]=bstr.charCodeAt(n);
        const blob=new Blob([u8],{type:'application/pdf'});
        const blobUrl=URL.createObjectURL(blob);
        body.innerHTML=`<iframe src="${blobUrl}" style="width:100%;height:520px;border:none;border-radius:8px;margin-bottom:10px;"></iframe>`;
      }catch(e){body.innerHTML=`<div style="text-align:center;padding:40px;color:#AAA;">PDF 미리보기를 불러올 수 없습니다.</div>`;}
    } else {
      // Storage URL — embed directly
      body.innerHTML=`<iframe src="${dataUrl}" style="width:100%;height:520px;border:none;border-radius:8px;margin-bottom:10px;"></iframe>`;
    }
  } else if(mime.startsWith('audio/')){
    if(dataUrl.startsWith('data:')){
      // base64 audio (short recordings) — play directly
      body.innerHTML=`<audio controls preload="auto" style="width:100%;margin-bottom:10px;"><source src="${dataUrl}" type="${mime}"></audio>`;
    } else {
      // Storage URL — play directly via <audio> src (no fetch, avoids CORS issues).
      // Firebase download URLs support HTTP range requests, so seeking works.
      const audio=document.createElement('audio');
      audio.controls=true; audio.preload='metadata';
      audio.style.cssText='width:100%;margin-bottom:10px;';
      audio.src=dataUrl;
      body.innerHTML='';
      body.appendChild(audio);
      const dl=document.createElement('button');
      dl.className='modal-btn-primary';dl.style.background='#C8671A';
      dl.textContent='다운로드 ↓';
      dl.onclick=()=>window.open(dataUrl,'_blank');
      body.appendChild(dl);
      audio.onerror=()=>{
        const err=audio.error;
        const codes={1:'재생 중단됨',2:'네트워크 오류(CORS)',3:'디코딩 오류',4:'형식 미지원'};
        const codeMsg=err?(codes[err.code]||('코드 '+err.code)):'알 수 없음';
        body.innerHTML=`<div style="text-align:center;padding:30px;color:#888;font-size:13px;">
          <div style="margin-bottom:8px;">🎵 ${fileName||'오디오'}</div>
          <div style="color:#C8671A;margin-bottom:12px;">재생 오류: ${codeMsg}</div>
          <a href="${dataUrl}" target="_blank" style="color:#C8671A;font-weight:700;">새 탭/다른 앱에서 열기 ↗</a>
        </div>`;
      };
      document.getElementById('previewModal').style.display='flex';
      return;
    }
  } else {
    body.innerHTML=`<div style="text-align:center;padding:40px;color:#AAA;font-size:13px;">📄 ${fileName}<br><br>이 형식은 미리보기가 지원되지 않습니다.</div>`;
  }
  const dlBtn=document.createElement('button');
  dlBtn.className='modal-btn-primary';dlBtn.style.background='#C8671A';
  dlBtn.textContent='다운로드 ↓';
  dlBtn.onclick=()=>downloadFile(dataUrl,fileName);
  body.appendChild(dlBtn);
  document.getElementById('previewModal').style.display='flex';
}

function fmtMin(m){const h=Math.floor(m/60),r=m%60;if(!h)return r+'분';if(!r)return h+'시간';return h+'시간 '+r+'분';}
function fmtMinEn(m){const h=Math.floor(m/60),r=m%60;if(!h)return r+'m';if(!r)return h+'h';return h+'h '+r+'m';}
function totalHours(m){return db[m].logs.reduce((s,r)=>s+(r.totalMin||0),0)/60;}
function getMonday(d){const[y,mo,dy]=d.split('-').map(Number);const dt=new Date(y,mo-1,dy);const day=dt.getDay(),diff=day===0?-6:1-day;dt.setDate(dt.getDate()+diff);return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;}
function getSunday(m){const[y,mo,dy]=m.split('-').map(Number);const d=new Date(y,mo-1,dy);d.setDate(d.getDate()+6);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function fmtD(s){const[,mo,d]=s.split('-');return `${mo}/${d}`;}
function weekLabel(m){return `${fmtD(m)} ~ ${fmtD(getSunday(m))}`;}
function groupByWeek(logs){const map={};logs.forEach(r=>{const mon=getMonday(r.date);if(!map[mon])map[mon]=[];map[mon].push(r);});return map;}
function getCurrentMonthKey(){const n=new Date();return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;}
function getMonthMinutes(member,mk){return db[member].logs.filter(r=>r.date.slice(0,7)===mk).reduce((s,r)=>s+(r.totalMin||0),0);}
function applyTheme(th){document.body.style.background=th.bg;document.getElementById('mainHeader').style.background=`linear-gradient(135deg,${th.p1},${th.p2} 55%,${th.p3})`;document.getElementById('adminBar').style.background=th.light;}

function renderMonthly(){
  const mk=getCurrentMonthKey();const[yr,mo]=mk.split('-');
  const scored=MEMBERS.map(m=>({name:m,min:getMonthMinutes(m,mk),th:getTheme(m)}));
  const sorted=[...scored].sort((a,b)=>b.min-a.min);
  const maxMin=Math.max(...scored.map(s=>s.min),1);
  const hofCards=sorted.slice(0,2).map((s,i)=>`<div class="hof-card ${['gold','silver'][i]}"><span class="hof-medal">${['🥇','🥈'][i]}</span><div class="hof-name">${s.name}</div><div class="hof-hours">${s.min>0?fmtMin(s.min):'기록 없음'}</div></div>`).join('');
  const barRows=scored.map(s=>{
    const crown=s.min>=420?'👑':'　';
    return `<div class="bar-row"><div class="bar-crown" style="width:15px;flex-shrink:0;font-size:19px;text-align:center;line-height:1.4;">${crown}</div><div class="bar-name">${s.name}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(s.min/maxMin*100)}%;background:linear-gradient(90deg,${s.th.p2},${s.th.p3});"></div></div><div class="bar-val" style="font-size:11px;color:#999;font-weight:500;">${s.min>0?fmtMinEn(s.min):'-'}</div></div>`;
  }).join('');
  document.getElementById('monthlySection').innerHTML=`<div class="monthly-title">🏆 ${yr}년 ${parseInt(mo)}월 이달의 현황</div><div class="hof-row">${hofCards}</div><div class="monthly-bars-title">이달 연습 현황</div>${barRows}`;
}

async function addMaterial(){
  const name=document.getElementById('matName').value.trim();

  const desc=document.getElementById('matDesc').value.trim();

    btn.disabled=true;btn.textContent='업로드 중...';
    try{
      let fileUrl='', storagePath='', fileData='';
      if(window._fb && window._fb.uploadToStorage){
        const result=await window._fb.uploadToStorage(selectedFileData,selectedFileName,'materials');
        fileUrl=result.url; storagePath=result.path;

        fileData=selectedFileData;
      }
      db._guide.materials.push({name,desc,fileUrl,storagePath,fileData,fileName:selectedFileName});
      save();renderMaterials();
    }catch(e){
      customAlert('업로드 실패: '+e.message);

      btn.disabled=false;btn.textContent='+ 자료 추가';

  document.getElementById('matDesc').value='';

  <div class="media-preview" id="mediaPrev_${k}">${em.map(f=>f.type&&f.type.startsWith('image/')?`<img src="${f.data}">`:`<span class="mp-file">${f.name}</span>`).join('')}</div>`;

async function onMediaChange(k){
  const inp=document.getElementById('mediaInput_'+k);
  if(!formMediaFiles[k])formMediaFiles[k]=[];
  const files=Array.from(inp.files);
  inp.value='';  // clear immediately to free the input

  for(const f of files){
    // Upload directly to Storage via Blob (no base64 in memory) when possible
    if(window._fb && window._fb.uploadFileToStorage){
      // show a temporary "uploading" placeholder
      const tempEntry={name:f.name,type:f.type,fileUrl:'',storagePath:'',data:'',uploading:true,progress:0};
      formMediaFiles[k].push(tempEntry);
      if(k.startsWith('edit_')){ renderEditMediaPreview(k,currentMember); } else { renderFMP(k); }
      try{
        const result=await window._fb.uploadFileToStorage(f, 'logs', (pct)=>{
          tempEntry.progress=pct;
          if(k.startsWith('edit_')){ renderEditMediaPreview(k,currentMember); } else { renderFMP(k); }
        });
        tempEntry.fileUrl=result.url;
        tempEntry.storagePath=result.path;
        if(result.contentType && !tempEntry.type) tempEntry.type=result.contentType;
        tempEntry.uploading=false;
      }catch(err){
        console.error('Upload failed:',err);
        // remove the failed entry
        const i=formMediaFiles[k].indexOf(tempEntry);
        if(i>=0) formMediaFiles[k].splice(i,1);
        customAlert('파일 업로드에 실패했어요. 다시 시도해주세요.');
      }
      if(k.startsWith('edit_')){
        const uid=k.replace('edit_','');
        renderEditMediaPreview(k,currentMember);
        updateLogItemMedia(currentMember,uid,formMediaFiles[k]);
      } else {
        renderFMP(k);
      }
    } else {
      // Fallback (no Firebase): read as base64 (local only)
      const reader=new FileReader();
      reader.onload=e=>{
        formMediaFiles[k].push({name:f.name,data:e.target.result,type:f.type});
        if(k.startsWith('edit_')){
          const uid=k.replace('edit_','');
          renderEditMediaPreview(k,currentMember);
          updateLogItemMedia(currentMember,uid,formMediaFiles[k]);
        } else { renderFMP(k); }
      };
      reader.readAsDataURL(f);
    }
  }
}
function renderFMP(k){const p=document.getElementById('mediaPrev_'+k);if(!p)return;p.innerHTML=(formMediaFiles[k]||[]).map(f=>{
    if(f.uploading) return `<span class="mp-file" style="opacity:0.7;">⏳ ${f.name} 업로드 중... ${f.progress||0}%</span>`;
    const src=f.fileUrl||f.data||'';
    return f.type&&f.type.startsWith('image/')?`<img src="${src}">`:`<span class="mp-file">${f.name}</span>`;
  }).join('');}

// ── App initialization ──
// Called when DOM is ready — waits for Firebase or times out to localStorage
function startApp(){
  if(window._fb){
    initApp(window._fb);
  } else {
    // Wait for fbReady event (max 5 seconds)
    const timer = setTimeout(()=>{
      console.warn('Firebase timeout - using localStorage');
      initApp(null);
    }, 5000);
    document.addEventListener('fbReady', (e)=>{
      clearTimeout(timer);
      initApp(e.detail);
    }, {once:true});
  }
}

async function initApp(fb){
  if(fb) window._fb=fb;
  const loader=document.createElement('div');
  loader.id='appLoader';
  loader.style.cssText='position:fixed;inset:0;background:#FFF8F0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;font-family:Nunito,sans-serif;gap:12px;';
  loader.innerHTML='<div style="font-size:40px;">🎻</div><div style="font-size:15px;font-weight:700;color:#C8671A;">첼로 파트 연습 관리</div><div style="font-size:12px;color:#8B6040;">데이터 불러오는 중...</div>';
  document.body.appendChild(loader);
  if(window._fbReady){
    await loadFromFirestore();
  } else {
    await new Promise(resolve=>{
      const timer=setTimeout(()=>{loadFromLocalStorage();resolve();},4000);
      window.addEventListener('firebaseReady',async()=>{clearTimeout(timer);await loadFromFirestore();resolve();},{once:true});
    });
  }
  loader.remove();
  renderHome();
  setupRealtimeSync();
  // Show Firebase status
  const fbStat = document.getElementById('fbStatus');
  if(fbStat){
    if(window._fb){
      fbStat.style.background='#D4EDDA';
      fbStat.style.color='#155724';
      fbStat.textContent='✅ Firebase 연결됨 - 실시간 공유 활성화';
      setTimeout(()=>fbStat.style.display='none', 4000);
    } else {
      fbStat.style.background='#F8D7DA';
      fbStat.style.color='#721C24';
      fbStat.textContent='❌ Firebase 연결 실패 - 로컬 저장 모드';
    }
  }

  // When app comes back to foreground, refresh data
  document.addEventListener('visibilitychange', async()=>{
    if(document.visibilityState==='visible'){
      // If user is mid-entry (e.g. just returned from camera/recorder), sync quietly without wiping form
      if(hasUnsavedFormInput()){
        await loadFromFirestore(true);
        return;
      }
      await loadFromFirestore();
      const homeActive=document.getElementById('screen-home').classList.contains('active');
      const memberActive=document.getElementById('screen-member').classList.contains('active');
      if(homeActive) renderHome();
      else if(memberActive) renderMemberPage(currentMember);
    }
  });
}

// Returns true if the user is actively filling the add-log form (so we shouldn't wipe it)
function hasUnsavedFormInput(){
  const memberActive=document.getElementById('screen-member') && document.getElementById('screen-member').classList.contains('active');
  if(!memberActive) return false;
  // any editing form open?
  if(document.querySelector('.inline-edit-form')) return true;
  // any numeric/text input filled in the add-form?
  const inputs=document.querySelectorAll('.add-form input, .add-form textarea');
  for(const el of inputs){
    if(el.type==='date') continue;  // date auto-fills, ignore
    if(el.value && el.value!=='0' && el.value.trim()!=='') return true;
  }
  // pending media files?
  if(currentMember){
    const k=currentMember.replace(/\s/g,'');
    if((formMediaFiles[k]||[]).length>0) return true;
  }
  return false;
}

function setupRealtimeSync(){
  if(!window._fb)return;
  const {db_fs,onSnapshot,doc}=window._fb;

  // Watch guide
  onSnapshot(doc(db_fs,'guide','data'),(snap)=>{
    if(!snap.exists())return;
    db._guide=normalizeFromFirestore(snap.data());
    if(document.getElementById('screen-guide').classList.contains('active')) renderGuide();
  },(err)=>console.warn('guide sync error',err));

  // Watch each member
  MEMBERS.forEach(m=>{
    onSnapshot(doc(db_fs,'members',m.replace(/\s/g,'_')),(snap)=>{
      if(!snap.exists())return;
      const fresh=normalizeFromFirestore(snap.data());
      if(!fresh.feedbacks)fresh.feedbacks={};
      if(!fresh.theme)fresh.theme={themeIdx:0,costume:'none'};
      if(!Array.isArray(fresh.logs))fresh.logs=[];
      fresh.logs.forEach(r=>{if(!r.uid)r.uid='u'+Math.random().toString(36).slice(2,9);});
      db[m]=fresh;
      // Don't wipe the form if user is mid-entry (e.g. just came back from camera)
      if(hasUnsavedFormInput()) return;
      const homeActive=document.getElementById('screen-home').classList.contains('active');
      const memberActive=document.getElementById('screen-member').classList.contains('active');
      if(homeActive){
        renderHome();
      } else if(memberActive){
        renderMemberPage(currentMember);
      }
    });
  });
}

startApp();


function customAlert(msg, cb){
  document.getElementById('alertMsg').textContent=msg;
  const modal=document.getElementById('alertModal');
  modal.style.display='flex';
  const btn=document.getElementById('alertOk');
  btn.onclick=()=>{modal.style.display='none';if(cb)cb();};
}
function customConfirm(msg, onYes, btnLabel){
  document.getElementById('confirmMsg').textContent=msg;
  const yBtn=document.getElementById('confirmYes');
  yBtn.textContent=btnLabel||'삭제';
  const modal=document.getElementById('confirmModal');
  modal.style.display='flex';
  document.getElementById('confirmNo').onclick=()=>{modal.style.display='none';};
  yBtn.onclick=()=>{modal.style.display='none';onYes();};
}
</script>

<script>
// PWA install prompt
let deferredPrompt;
window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault();
  deferredPrompt=e;
  const banner=document.getElementById('pwaInstallBanner');
  if(banner)banner.style.display='flex';
});
function installPWA(){
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{
    deferredPrompt=null;
    const banner=document.getElementById('pwaInstallBanner');
    if(banner)banner.style.display='none';
  });
}
window.addEventListener('appinstalled',()=>{
  const banner=document.getElementById('pwaInstallBanner');
  if(banner)banner.style.display='none';
});

// Register service worker
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').then(reg=>{
      console.log('SW registered');
    }).catch(()=>{});
  });
}
